# Production Docker stack: web (public), worker, pocketbase (internal + LAN/WireGuard admin), dem-tools.
# Externally reachable: web only (port 3000). Cloudflare Tunnel: point https://tracker.nhwalker.net -> web only.
# Memory limits are set so one service, especially the DEM worker, cannot starve the host.

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: tracker-web:latest
    ports:
      - "3000:3000"
    mem_limit: 2g
    memswap_limit: 2g
    environment:
      NEXT_PUBLIC_PB_URL: http://pocketbase:8090
      DEM_BASE_PATH: /data/dem
      DEM_MANIFEST_PATH: manifest.json
    volumes:
      - dem_output:/data/dem:ro
    depends_on:
      pocketbase:
        condition: service_healthy
    command: ["pnpm", "start"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://127.0.0.1:3000/',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - tracker

  worker:
    image: tracker-web:latest
    deploy:
      replicas: 1
    # Bounded memory: heap below limit so OOM is contained; swap allows headroom during DEM peaks.
    mem_limit: 6g
    memswap_limit: 8g
    environment:
      NEXT_PUBLIC_PB_URL: http://pocketbase:8090
      DEM_BASE_PATH: /data/dem
      DEM_MANIFEST_PATH: manifest.json
      NODE_OPTIONS: "--max-old-space-size=3072"
      # ENRICHMENT_WORKER_POLL_INTERVAL_MS: 5000
    volumes:
      - dem_output:/data/dem:ro
    depends_on:
      pocketbase:
        condition: service_healthy
    command: ["node", "--import", "tsx", "scripts/enrichment-worker.ts"]
    restart: unless-stopped
    # No ports. No healthcheck (no HTTP server). Run a single worker process.
    networks:
      - tracker

  pocketbase:
    build:
      context: ./apps/pb
      dockerfile: Dockerfile
    image: tracker-pocketbase:latest
    mem_limit: 1g
    memswap_limit: 1g
    volumes:
      - pb_data:/app/pb_data
    # Exposes PocketBase admin/API on the host.
    # Restrict access with host firewall rules to LAN + WireGuard only.
    ports:
      - "8090:8090"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:8090/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - tracker

  dem-tools:
    build:
      context: ./tools/dem
      dockerfile: Dockerfile
    image: tracker-dem-tools:latest
    mem_limit: 4g
    memswap_limit: 4g
    # Internal-only maintenance container for DEM generation. No ports; not public.
    volumes:
      - dem_raw:/workspace/raw
      - dem_output:/workspace/output
    # Idle container so DEM commands can be run from the Coolify terminal.
    entrypoint: ["/bin/sh", "-lc"]
    command: ["sleep infinity"]
    restart: unless-stopped
    networks:
      - tracker

volumes:
  pb_data:
  dem_raw:
  dem_output:

networks:
  tracker:
    driver: bridge